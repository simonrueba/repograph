name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: ariadne-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            artifact: ariadne-linux-arm64
          - target: bun-darwin-x64
            os: macos-13
            artifact: ariadne-darwin-x64
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: ariadne-darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - run: bun install --frozen-lockfile

      - name: Compile standalone binary
        run: |
          bun build packages/cli/src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          for dir in dist/*/; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name"
          done
          cd release && sha256sum * > SHA256SUMS

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/ariadne-linux-x64
            release/ariadne-linux-arm64
            release/ariadne-darwin-x64
            release/ariadne-darwin-arm64
            release/SHA256SUMS
