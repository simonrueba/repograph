name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  structural-analysis:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build Ariadne
        run: bun run build

      - name: Setup Index
        run: bun packages/cli/dist/index.js setup --quick

      - name: Run Structural Analysis
        id: ariadne
        run: |
          REPORT=$(bun packages/cli/dist/index.js ci --base "${{ github.base_ref }}" 2>/dev/null || true)
          bun packages/cli/dist/index.js ci --base "${{ github.base_ref }}" --markdown > /tmp/ariadne-comment.md 2>/dev/null || true

          if echo "$REPORT" | jq -e '.data.summary' > /dev/null 2>&1; then
            echo "policy-passed=$(echo "$REPORT" | jq -r '.data.summary.policyPassed')" >> "$GITHUB_OUTPUT"
          else
            echo "policy-passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/ariadne-comment.md', 'utf8');
            } catch {
              body = '## Ariadne Structural Report\n\nAnalysis could not be generated.';
            }
            const marker = 'Ariadne Structural Report';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Check Policy
        run: |
          if [ "${{ steps.ariadne.outputs.policy-passed }}" == "false" ]; then
            echo "::error::Ariadne policy check failed. See PR comment for details."
            exit 1
          fi
